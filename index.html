<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPAT — Part Data Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --shell:#28374a;
    --shell-text:#ffffff;
    --page-bg:#f5f6f7;
    --content-bg:#ffffff;
    --border:#d9d9d9;
    --border-strong:#bcbcbc;
    --text:#32363a;
    --text-secondary:#6a6d70;
    --text-muted:#909398;
    --accent:#0a6ed1;
    --accent-dark:#0854a0;
    --hover:#f5faff;
    --selected:#e5f0fa;
    --header-bg:#f2f3f5;
    --positive:#107e3e;
    --positive-bg:#e8f6ee;
    --negative:#bb0000;
    --negative-bg:#fbeaea;
    --critical:#a65900;
    --critical-bg:#fdf2e2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--page-bg);
    color:var(--text);
    font-family:'Inter', Arial, sans-serif;
    font-size:13px;
    min-height:100vh;
  }

  /* shell bar */
  .shell{
    background:var(--shell);
    color:var(--shell-text);
    display:flex;
    align-items:center;
    height:44px;
    padding:0 12px;
    gap:12px;
  }
  .shell .menu-ico{
    width:28px;height:28px;
    display:flex;align-items:center;justify-content:center;
    border-radius:2px;
    cursor:pointer;
    opacity:0.85;
  }
  .shell .menu-ico:hover{background:rgba(255,255,255,0.12);opacity:1;}
  .shell .app-title{
    font-size:15px;
    font-weight:600;
    letter-spacing:0.01em;
  }
  .shell .crumbs{
    font-size:12px;
    color:rgba(255,255,255,0.65);
    margin-left:2px;
  }
  .shell .spacer{flex:1;}
  .shell .avatar{
    width:26px;height:26px;border-radius:50%;
    background:#5a92c4;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:600;color:#fff;
  }

  .wrap{max-width:1180px;margin:0 auto;padding:16px 20px 40px;}

  /* list report header */
  .lr-header{
    background:var(--content-bg);
    border:1px solid var(--border);
    border-bottom:none;
    padding:14px 18px 12px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .lr-header h1{
    font-size:19px;
    font-weight:600;
    margin:0;
    color:var(--text);
  }
  .lr-header .count-badge{
    font-size:12px;
    color:var(--text-secondary);
    font-weight:400;
    margin-left:8px;
  }
  .lr-header .src{
    font-size:11.5px;
    color:var(--text-muted);
  }

  /* filter bar */
  .filterbar{
    background:var(--content-bg);
    border:1px solid var(--border);
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border-strong);
    padding:12px 18px 14px;
    display:flex;
    align-items:flex-end;
    gap:16px;
    flex-wrap:wrap;
  }
  .fld{display:flex;flex-direction:column;gap:4px;}
  .fld label{
    font-size:11px;
    color:var(--text-secondary);
    font-weight:500;
  }
  .fld input[type=text], .fld select{
    font-family:'Inter', Arial, sans-serif;
    font-size:13px;
    height:30px;
    border:1px solid var(--border-strong);
    border-radius:2px;
    background:#fff;
    color:var(--text);
    padding:0 8px;
    min-width:170px;
    outline:none;
  }
  .fld input[type=text]:focus, .fld select:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent);
  }
  .fld.grow input{flex:1;min-width:220px;}
  .go-btn{
    height:30px;
    padding:0 18px;
    background:var(--accent);
    color:#fff;
    border:1px solid var(--accent);
    border-radius:2px;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
  }
  .go-btn:hover{background:var(--accent-dark);border-color:var(--accent-dark);}
  .clear-link{
    font-size:12.5px;
    color:var(--accent);
    cursor:pointer;
    background:none;
    border:none;
    padding:0;
    text-decoration:none;
  }
  .clear-link:hover{text-decoration:underline;}
  .filegroup{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .filebtn{
    height:30px;
    display:flex;align-items:center;gap:6px;
    font-size:12.5px;
    border:1px solid var(--border-strong);
    background:#fff;
    color:var(--text);
    padding:0 12px;
    border-radius:2px;
    cursor:pointer;
  }
  .filebtn:hover{background:var(--hover);border-color:var(--accent);}
  .filename{
    font-size:11.5px;
    color:var(--text-muted);
    max-width:150px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  #fileInput{display:none;}

  /* table */
  .tablewrap{
    background:var(--content-bg);
    border:1px solid var(--border-strong);
    border-top:none;
    overflow-x:auto;
  }
  table{width:100%;border-collapse:collapse;min-width:760px;}
  thead th{
    position:sticky;top:0;
    background:var(--header-bg);
    color:var(--text);
    font-size:12px;
    font-weight:600;
    text-align:left;
    padding:9px 14px;
    border-bottom:2px solid var(--border-strong);
    border-right:1px solid var(--border);
    cursor:pointer;
    white-space:nowrap;
    user-select:none;
  }
  thead th:last-child{border-right:none;}
  thead th:hover{background:#e8ecf1;}
  thead th .arrow{color:var(--accent);margin-left:4px;font-size:10px;}
  thead th.num-col{text-align:right;}
  tbody td{
    padding:8px 14px;
    border-bottom:1px solid var(--border);
    border-right:1px solid #ececec;
    font-size:12.5px;
    white-space:nowrap;
  }
  tbody td:last-child{border-right:none;}
  tbody tr:hover{background:var(--hover);}
  tbody tr:hover td{background:var(--hover);}
  td.num{text-align:right;font-variant-numeric:tabular-nums;}
  .partno{color:var(--accent-dark);font-weight:500;}
  .qbadge{
    display:inline-block;
    font-size:11px;
    padding:2px 7px;
    background:#eef1f4;
    color:var(--text-secondary);
    border:1px solid var(--border-strong);
    border-radius:2px;
  }
  .price{font-variant-numeric:tabular-nums;}
  .splitcell{display:flex;align-items:center;justify-content:flex-end;gap:8px;}
  .splitbar{width:64px;height:6px;background:#e6e6e6;border-radius:1px;overflow:hidden;}
  .splitbar i{display:block;height:100%;background:var(--positive);}
  .splitbar.zero i{background:var(--negative);width:100% !important;opacity:0.25;}
  .splitval{font-size:12.5px;min-width:32px;text-align:right;}
  .status-pos{color:var(--positive);}
  .status-zero{color:var(--negative);}
  .empty{padding:60px 20px;text-align:center;color:var(--text-muted);font-size:12.5px;}
  .empty .sub{display:block;font-size:11.5px;margin-top:6px;}

  /* status bar */
  .statusbar{
    background:var(--content-bg);
    border:1px solid var(--border-strong);
    border-top:none;
    padding:8px 18px;
    display:flex;
    gap:22px;
    flex-wrap:wrap;
    font-size:11.5px;
    color:var(--text-secondary);
  }
  .statusbar b{color:var(--text);font-weight:600;}

  .dropoverlay{
    position:fixed;inset:0;
    background:rgba(40,55,74,0.88);
    display:none;
    align-items:center;justify-content:center;
    color:#fff;
    font-size:15px;
    letter-spacing:0.02em;
    z-index:50;
    pointer-events:none;
  }
  .dropoverlay.active{display:flex;}

  @media (max-width:640px){
    .wrap{padding:12px;}
    .filegroup{margin-left:0;width:100%;}
    .fld input, .fld select{min-width:140px;}
  }
</style>
</head>
<body>

<div class="shell">
  <div class="menu-ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 3h14M1 8h14M1 13h14" stroke="currentColor" stroke-width="1.5"/></svg>
  </div>
  <div class="app-title">Data Viewer</div>
  <div class="crumbs">Sourcing &rsaquo; Part Master &rsaquo; MPAT</div>
  <div class="spacer"></div>
  <div class="avatar">MP</div>
</div>

<div class="wrap">
  <div class="lr-header">
    <div>
      <h1 id="lrTitle">MPAT — Part Data<span class="count-badge" id="countBadge">(7)</span></h1>
    </div>
    <div class="src">File: <span id="metaFile">MPAT_File.xlsx</span> &nbsp;|&nbsp; Sheet: <span id="metaSheet">Sheet1</span></div>
  </div>

  <div class="filterbar">
    <div class="fld grow">
      <label>Search</label>
      <input type="text" id="search" placeholder="Part number or manufacturer…">
    </div>
    <div class="fld">
      <label>Quarter</label>
      <select id="quarterFilter"><option value="">All</option></select>
    </div>
    <div class="fld">
      <label>Manufacturer</label>
      <select id="mfrFilter"><option value="">All</option></select>
    </div>
    <button class="go-btn" id="goBtn" type="button">Go</button>
    <button class="clear-link" id="clearBtn" type="button">Clear filters</button>
    <div class="filegroup">
      <span class="filename" id="fileLabel">MPAT_File.xlsx</span>
      <button class="filebtn" id="loadBtn" type="button">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0L5 7m3 3l3-3M2 12v1.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Open file
      </button>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
    </div>
  </div>

  <div class="tablewrap">
    <table id="dataTable">
      <thead><tr id="headRow"></tr></thead>
      <tbody id="bodyRows"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none;">
      No rows match your filters.
      <span class="sub">Try clearing search or resetting the dropdowns above.</span>
    </div>
  </div>

  <div class="statusbar" id="statusBar"></div>
</div>

<div class="dropoverlay" id="dropOverlay">Drop file to load ↓</div>

<script>
const DEFAULT_DATA = {
  fileName: "MPAT_File.xlsx",
  sheetName: "Sheet1",
  columns: ["Quarter","Part Number","Manufacturer Name","Item Price","MOQ","Business Split"],
  rows: [
    ["Q4'26","MEM-00292","GIGADEVICE",1.20,1500,20],
    ["Q4'26","MEM-00298","GIGADEVICE",1.34,200,30],
    ["Q4'26","MEM-00325","GIGADEVICE",1.15,3500,40],
    ["Q4'26","MEM-00344","GIGADEVICE",2.10,4200,0],
    ["Q4'26","MEM-00374","GIGADEVICE",2.30,5000,50],
    ["Q4'26","MEM-00422","GIGADEVICE",2.20,2500,0],
    ["Q4'26","MEM-00437","GIGADEVICE",2.46,5000,80]
  ]
};

let state = {
  columns: DEFAULT_DATA.columns,
  rows: DEFAULT_DATA.rows,
  fileName: DEFAULT_DATA.fileName,
  sheetName: DEFAULT_DATA.sheetName,
  sortCol: 0,
  sortDir: 1
};

function colType(name){
  if(name === "Item Price" || name === "MOQ" || name === "Business Split") return "num";
  return "text";
}

function populateFilters(){
  const qSel = document.getElementById('quarterFilter');
  const mSel = document.getElementById('mfrFilter');
  const qIdx = state.columns.indexOf("Quarter");
  const mIdx = state.columns.indexOf("Manufacturer Name");
  qSel.innerHTML = '<option value="">All</option>';
  mSel.innerHTML = '<option value="">All</option>';
  if(qIdx === -1 || mIdx === -1) return;
  const quarters = [...new Set(state.rows.map(r=>r[qIdx]))].sort();
  const mfrs = [...new Set(state.rows.map(r=>r[mIdx]))].sort();
  quarters.forEach(q=>{ const o=document.createElement('option'); o.value=q; o.textContent=q; qSel.appendChild(o); });
  mfrs.forEach(m=>{ const o=document.createElement('option'); o.value=m; o.textContent=m; mSel.appendChild(o); });
}

function renderHead(){
  const headRow = document.getElementById('headRow');
  headRow.innerHTML = '';
  state.columns.forEach((col, i)=>{
    const th = document.createElement('th');
    if(colType(col) === 'num') th.classList.add('num-col');
    th.textContent = col;
    if(state.sortCol === i){
      const arrow = document.createElement('span');
      arrow.className='arrow';
      arrow.textContent = state.sortDir === 1 ? '▲' : '▼';
      th.appendChild(arrow);
    }
    th.addEventListener('click', ()=>{
      if(state.sortCol === i){ state.sortDir *= -1; } else { state.sortCol = i; state.sortDir = 1; }
      renderHead(); renderBody();
    });
    headRow.appendChild(th);
  });
}

function fmtPrice(v){ const n = Number(v); return isNaN(n) ? v : '$' + n.toFixed(2); }
function fmtInt(v){ const n = Number(v); return isNaN(n) ? v : n.toLocaleString(); }

function renderBody(){
  const search = document.getElementById('search').value.trim().toLowerCase();
  const qFilter = document.getElementById('quarterFilter').value;
  const mFilter = document.getElementById('mfrFilter').value;
  const qIdx = state.columns.indexOf("Quarter");
  const mIdx = state.columns.indexOf("Manufacturer Name");
  const pIdx = state.columns.indexOf("Part Number");
  const priceIdx = state.columns.indexOf("Item Price");
  const moqIdx = state.columns.indexOf("MOQ");
  const splitIdx = state.columns.indexOf("Business Split");

  let rows = state.rows.filter(r=>{
    if(qFilter && qIdx !== -1 && r[qIdx] !== qFilter) return false;
    if(mFilter && mIdx !== -1 && r[mIdx] !== mFilter) return false;
    if(search){
      const hay = r.map(v=>String(v).toLowerCase()).join(' ');
      if(!hay.includes(search)) return false;
    }
    return true;
  });

  const sc = state.sortCol, sd = state.sortDir;
  rows = rows.slice().sort((a,b)=>{
    let va = a[sc], vb = b[sc];
    const isNum = colType(state.columns[sc]) === "num";
    if(isNum){ va = Number(va)||0; vb = Number(vb)||0; return (va-vb)*sd; }
    return String(va).localeCompare(String(vb)) * sd;
  });

  const body = document.getElementById('bodyRows');
  const emptyState = document.getElementById('emptyState');
  body.innerHTML = '';

  if(rows.length === 0){
    emptyState.style.display = 'block';
    document.getElementById('dataTable').style.display = 'none';
  } else {
    emptyState.style.display = 'none';
    document.getElementById('dataTable').style.display = 'table';
  }

  const maxSplit = Math.max(1, ...state.rows.map(r=> splitIdx!==-1 ? Number(r[splitIdx])||0 : 0));

  rows.forEach(r=>{
    const tr = document.createElement('tr');
    state.columns.forEach((col, i)=>{
      const td = document.createElement('td');
      const val = r[i];
      if(i === qIdx){
        const badge = document.createElement('span');
        badge.className = 'qbadge';
        badge.textContent = val;
        td.appendChild(badge);
      } else if(i === pIdx){
        td.className = 'partno';
        td.textContent = val;
      } else if(i === priceIdx){
        td.className = 'price num';
        td.textContent = fmtPrice(val);
      } else if(i === moqIdx){
        td.className = 'num';
        td.textContent = fmtInt(val);
      } else if(i === splitIdx){
        const n = Number(val) || 0;
        td.className = 'num';
        const wrap = document.createElement('div');
        wrap.className = 'splitcell';
        const bar = document.createElement('div');
        bar.className = 'splitbar' + (n === 0 ? ' zero' : '');
        const fill = document.createElement('i');
        fill.style.width = Math.max(2, (n / maxSplit) * 100) + '%';
        bar.appendChild(fill);
        const num = document.createElement('span');
        num.className = 'splitval ' + (n === 0 ? 'status-zero' : 'status-pos');
        num.textContent = n + '%';
        wrap.appendChild(bar);
        wrap.appendChild(num);
        td.appendChild(wrap);
      } else {
        td.textContent = val;
      }
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });

  document.getElementById('countBadge').textContent = '(' + rows.length + ')';
  renderStatus(rows);
}

function renderStatus(visibleRows){
  const bar = document.getElementById('statusBar');
  bar.innerHTML = '';
  const priceIdx = state.columns.indexOf("Item Price");
  const moqIdx = state.columns.indexOf("MOQ");
  const splitIdx = state.columns.indexOf("Business Split");
  const mIdx = state.columns.indexOf("Manufacturer Name");

  const items = [];
  items.push('Displaying <b>' + visibleRows.length + '</b> of <b>' + state.rows.length + '</b> items');
  if(mIdx !== -1) items.push('<b>' + new Set(visibleRows.map(r=>r[mIdx])).size + '</b> manufacturers');
  if(priceIdx !== -1 && visibleRows.length){
    const avg = visibleRows.reduce((s,r)=>s+(Number(r[priceIdx])||0),0)/visibleRows.length;
    items.push('Avg price <b>$' + avg.toFixed(2) + '</b>');
  }
  if(moqIdx !== -1 && visibleRows.length){
    const totalMoq = visibleRows.reduce((s,r)=>s+(Number(r[moqIdx])||0),0);
    items.push('Total MOQ <b>' + totalMoq.toLocaleString() + '</b>');
  }
  if(splitIdx !== -1 && visibleRows.length){
    const totalSplit = visibleRows.reduce((s,r)=>s+(Number(r[splitIdx])||0),0);
    items.push('Split sum <b>' + totalSplit + '%</b>');
  }
  items.forEach(html=>{
    const span = document.createElement('span');
    span.innerHTML = html;
    bar.appendChild(span);
  });
}

function refreshAll(){
  document.getElementById('metaFile').textContent = state.fileName;
  document.getElementById('metaSheet').textContent = state.sheetName;
  document.getElementById('fileLabel').textContent = state.fileName;
  populateFilters();
  renderHead();
  renderBody();
}

function loadWorkbookData(wb, fileName){
  const sheetName = wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const json = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
  if(json.length < 1) return;
  const columns = json[0].map(c=>String(c));
  const rows = json.slice(1).filter(r=>r.some(v=>v!==""));
  state = { columns, rows, fileName, sheetName, sortCol:0, sortDir:1 };
  refreshAll();
}

document.getElementById('loadBtn').addEventListener('click', ()=> document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt)=>{
    const data = new Uint8Array(evt.target.result);
    const wb = XLSX.read(data, {type:'array'});
    loadWorkbookData(wb, file.name);
  };
  reader.readAsArrayBuffer(file);
});

['dragenter','dragover'].forEach(evt=>{
  window.addEventListener(evt, (e)=>{ e.preventDefault(); document.getElementById('dropOverlay').classList.add('active'); });
});
['dragleave','drop'].forEach(evt=>{
  window.addEventListener(evt, (e)=>{
    e.preventDefault();
    if(evt === 'dragleave' && e.relatedTarget) return;
    document.getElementById('dropOverlay').classList.remove('active');
  });
});
window.addEventListener('drop', (e)=>{
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt)=>{
    const data = new Uint8Array(evt.target.result);
    const wb = XLSX.read(data, {type:'array'});
    loadWorkbookData(wb, file.name);
  };
  reader.readAsArrayBuffer(file);
});

document.getElementById('search').addEventListener('input', renderBody);
document.getElementById('quarterFilter').addEventListener('change', renderBody);
document.getElementById('mfrFilter').addEventListener('change', renderBody);
document.getElementById('goBtn').addEventListener('click', renderBody);
document.getElementById('clearBtn').addEventListener('click', ()=>{
  document.getElementById('search').value = '';
  document.getElementById('quarterFilter').value = '';
  document.getElementById('mfrFilter').value = '';
  renderBody();
});

refreshAll();
</script>
</body>
</html>
