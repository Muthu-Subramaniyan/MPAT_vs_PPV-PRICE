<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPAT — Part Data Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --shell:#28374a;
    --shell-text:#ffffff;
    --page-bg:#f5f6f7;
    --content-bg:#ffffff;
    --border:#d9d9d9;
    --border-strong:#bcbcbc;
    --text:#32363a;
    --text-secondary:#6a6d70;
    --text-muted:#909398;
    --accent:#0a6ed1;
    --accent-dark:#0854a0;
    --hover:#f5faff;
    --header-bg:#f2f3f5;
    --positive:#107e3e;
    --negative:#bb0000;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--page-bg);
    color:var(--text);
    font-family:'Inter', Arial, sans-serif;
    font-size:13px;
    min-height:100vh;
  }

  .shell{
    background:var(--shell);
    color:var(--shell-text);
    display:flex;
    align-items:center;
    height:44px;
    padding:0 12px;
    gap:12px;
  }
  .shell .menu-ico{
    width:28px;height:28px;
    display:flex;align-items:center;justify-content:center;
    border-radius:2px;
  }
  .shell .app-title{font-size:15px;font-weight:600;letter-spacing:0.01em;}
  .shell .crumbs{font-size:12px;color:rgba(255,255,255,0.65);margin-left:2px;}
  .shell .spacer{flex:1;}
  .shell .avatar{
    width:26px;height:26px;border-radius:50%;
    background:#5a92c4;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:600;color:#fff;
  }

  .wrap{max-width:1240px;margin:0 auto;padding:16px 20px 40px;}

  .lr-header{
    background:var(--content-bg);
    border:1px solid var(--border);
    border-bottom:none;
    padding:14px 18px 12px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .lr-header h1{font-size:19px;font-weight:600;margin:0;color:var(--text);}
  .lr-header .count-badge{font-size:12px;color:var(--text-secondary);font-weight:400;margin-left:8px;}
  .lr-header .src{font-size:11.5px;color:var(--text-muted);line-height:1.6;text-align:right;}
  .lr-header .src b{color:var(--text-secondary);font-weight:500;}

  .filterbar{
    background:var(--content-bg);
    border:1px solid var(--border);
    border-top:1px solid var(--border);
    border-bottom:1px solid var(--border-strong);
    padding:12px 18px 14px;
    display:flex;
    align-items:flex-end;
    gap:16px;
    flex-wrap:wrap;
  }
  .fld{display:flex;flex-direction:column;gap:4px;}
  .fld label{font-size:11px;color:var(--text-secondary);font-weight:500;}
  .fld input[type=text], .fld select{
    font-family:'Inter', Arial, sans-serif;
    font-size:13px;
    height:30px;
    border:1px solid var(--border-strong);
    border-radius:2px;
    background:#fff;
    color:var(--text);
    padding:0 8px;
    min-width:170px;
    outline:none;
  }
  .fld input[type=text]:focus, .fld select:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent);
  }
  .fld.grow input{flex:1;min-width:200px;}
  .go-btn{
    height:30px;padding:0 18px;
    background:var(--accent);color:#fff;
    border:1px solid var(--accent);border-radius:2px;
    font-size:13px;font-weight:500;cursor:pointer;
  }
  .go-btn:hover{background:var(--accent-dark);border-color:var(--accent-dark);}
  .clear-link{
    font-size:12.5px;color:var(--accent);cursor:pointer;
    background:none;border:none;padding:0;
  }
  .clear-link:hover{text-decoration:underline;}
  .filegroup{
    margin-left:auto;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  }
  .fileslot{display:flex;align-items:center;gap:6px;}
  .filebtn{
    height:30px;display:flex;align-items:center;gap:6px;
    font-size:12.5px;
    border:1px solid var(--border-strong);
    background:#fff;color:var(--text);
    padding:0 12px;border-radius:2px;cursor:pointer;
  }
  .filebtn:hover{background:var(--hover);border-color:var(--accent);}
  .filename{
    font-size:11px;color:var(--text-muted);
    max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  #mpatInput, #ppvInput{display:none;}
  .tmpl-link{
    font-size:11px;
    color:var(--accent);
    text-decoration:none;
    white-space:nowrap;
  }
  .tmpl-link:hover{text-decoration:underline;}

  .tablewrap{
    background:var(--content-bg);
    border:1px solid var(--border-strong);
    border-top:none;
    overflow-x:auto;
  }
  table{width:100%;border-collapse:collapse;min-width:1080px;}
  thead th{
    position:sticky;top:0;
    background:var(--header-bg);
    color:var(--text);
    font-size:12px;font-weight:600;text-align:left;
    padding:9px 14px;
    border-bottom:2px solid var(--border-strong);
    border-right:1px solid var(--border);
    cursor:pointer;white-space:nowrap;user-select:none;
  }
  thead th:last-child{border-right:none;}
  thead th:hover{background:#e8ecf1;}
  thead th .arrow{color:var(--accent);margin-left:4px;font-size:10px;}
  thead th.num-col{text-align:right;}
  thead th.computed{background:#eaf2fb;}
  tbody td{
    padding:8px 14px;
    border-bottom:1px solid var(--border);
    border-right:1px solid #ececec;
    font-size:12.5px;white-space:nowrap;
  }
  tbody td:last-child{border-right:none;}
  tbody tr:hover td{background:var(--hover);}
  td.num{text-align:right;font-variant-numeric:tabular-nums;}
  td.computed{background:#f6faff;}
  .partno{color:var(--accent-dark);font-weight:500;}
  .mono{font-family:'SFMono-Regular', Consolas, 'Liberation Mono', monospace; font-size:12px;}
  .qbadge{
    display:inline-block;font-size:11px;padding:2px 7px;
    background:#eef1f4;color:var(--text-secondary);
    border:1px solid var(--border-strong);border-radius:2px;
  }
  .price{font-variant-numeric:tabular-nums;}
  .impact-green{color:var(--positive);font-weight:500;}
  .impact-red{color:var(--negative);font-weight:500;}
  .impact-na{color:var(--text-muted);font-style:italic;}
  tr.row-new td{background:#fff9e8;}
  tr.row-new:hover td{background:#fef2cf;}
  .newtag{
    display:inline-block;
    margin-left:8px;
    font-size:9.5px;
    font-weight:600;
    letter-spacing:0.03em;
    color:#8a5a00;
    background:#ffe9ad;
    border:1px solid #e0b23c;
    border-radius:2px;
    padding:1px 5px;
    vertical-align:middle;
  }
  th.actions-col{min-width:118px;}
  td.actions-col{white-space:nowrap;}
  .act-btn{
    font-family:'Inter', Arial, sans-serif;
    font-size:11.5px;
    border:1px solid var(--border-strong);
    background:#fff;
    padding:4px 9px;
    border-radius:2px;
    cursor:pointer;
    margin-right:6px;
  }
  .act-btn:last-child{margin-right:0;}
  .act-edit{color:var(--accent);}
  .act-edit:hover{background:var(--hover);border-color:var(--accent);}
  .act-delete{color:var(--negative);}
  .act-delete:hover{background:#fbeaea;border-color:var(--negative);}
  .act-save{color:#fff;background:var(--positive);border-color:var(--positive);}
  .act-save:hover{background:#0c6a35;}
  .act-cancel{color:var(--text-secondary);}
  .act-cancel:hover{background:var(--hover);}
  tr.row-editing td{background:#fbfdf9;}
  .edit-input{
    font-family:'Inter', Arial, sans-serif;
    font-size:12.5px;
    border:1px solid var(--accent);
    border-radius:2px;
    padding:4px 6px;
    width:100%;
    min-width:80px;
    outline:none;
    box-sizing:border-box;
  }
  input.edit-input[type=number]{text-align:right;}
  .splitcell{display:flex;align-items:center;justify-content:flex-end;gap:8px;}
  .splitbar{width:60px;height:6px;background:#e6e6e6;border-radius:1px;overflow:hidden;}
  .splitbar i{display:block;height:100%;background:var(--positive);}
  .splitbar.zero i{background:var(--negative);width:100% !important;opacity:0.25;}
  .splitval{font-size:12.5px;min-width:32px;text-align:right;}
  .empty{padding:60px 20px;text-align:center;color:var(--text-muted);font-size:12.5px;}
  .empty .sub{display:block;font-size:11.5px;margin-top:6px;}

  .statusbar{
    background:var(--content-bg);
    border:1px solid var(--border-strong);
    border-top:none;
    padding:8px 18px;
    display:flex;gap:22px;flex-wrap:wrap;
    font-size:11.5px;color:var(--text-secondary);
  }
  .statusbar b{color:var(--text);font-weight:600;}
  .statusbar .total-green{color:var(--positive);}
  .statusbar .total-red{color:var(--negative);}

  @media (max-width:640px){
    .wrap{padding:12px;}
    .filegroup{margin-left:0;width:100%;}
    .fld input, .fld select{min-width:140px;}
  }
</style>
</head>
<body>

<div class="shell">
  <div class="menu-ico">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 3h14M1 8h14M1 13h14" stroke="currentColor" stroke-width="1.5"/></svg>
  </div>
  <div class="app-title">Data Viewer</div>
  <div class="crumbs">Sourcing &rsaquo; Part Master &rsaquo; MPAT vs PPV</div>
  <div class="spacer"></div>
  <div class="avatar">MP</div>
</div>

<div class="wrap">
  <div class="lr-header">
    <div>
      <h1>MPAT — Part Data<span class="count-badge" id="countBadge">(7)</span></h1>
    </div>
    <div class="src">
      MPAT: <b id="metaMpat">MPAT_File.xlsx</b><br>
      PPV: <b id="metaPpv">PPV_File.xlsx</b>
    </div>
  </div>

  <div class="filterbar">
    <div class="fld grow">
      <label>Search</label>
      <input type="text" id="search" placeholder="Part number, MPN, manufacturer, or CM…">
    </div>
    <div class="fld">
      <label>Quarter</label>
      <select id="quarterFilter"><option value="">All</option></select>
    </div>
    <div class="fld">
      <label>Manufacturer</label>
      <select id="mfrFilter"><option value="">All</option></select>
    </div>
    <button class="go-btn" id="goBtn" type="button">Go</button>
    <button class="clear-link" id="clearBtn" type="button">Clear filters</button>
    <div class="filegroup">
      <div class="fileslot">
        <span class="filename" id="mpatLabel">MPAT_File.xlsx</span>
        <button class="filebtn" id="loadMpatBtn" type="button">Open MPAT</button>
        <a class="tmpl-link" id="downloadMpatTemplate" href="#">Template</a>
        <input type="file" id="mpatInput" accept=".xlsx,.xls,.csv">
      </div>
      <div class="fileslot">
        <span class="filename" id="ppvLabel">PPV_File.xlsx</span>
        <button class="filebtn" id="loadPpvBtn" type="button">Open PPV</button>
        <a class="tmpl-link" id="downloadPpvTemplate" href="#">Template</a>
        <input type="file" id="ppvInput" accept=".xlsx,.xls,.csv">
      </div>
    </div>
  </div>

  <div class="tablewrap">
    <table id="dataTable">
      <thead><tr id="headRow"></tr></thead>
      <tbody id="bodyRows"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none;">
      No rows match your filters.
      <span class="sub">Try clearing search or resetting the dropdowns above.</span>
    </div>
  </div>

  <div class="statusbar" id="statusBar"></div>
</div>

<script>
const MPAT_DEFAULT = {
  fileName: "MPAT_File.xlsx",
  rows: [
    ["Q4'26","MEM-00292","GIGADEVICE","GD25Q127C","FOXCONN",1.20,1500,20],
    ["Q4'26","MEM-00298","GIGADEVICE","GD25Q128C","FLEX",1.34,200,30],
    ["Q4'26","MEM-00325","GIGADEVICE","GD25Q129C","JABIL",1.15,3500,40],
    ["Q4'26","MEM-00344","GIGADEVICE","GD25Q130C","FOXCONN",2.10,4200,0],
    ["Q4'26","MEM-00374","GIGADEVICE","GD25Q131C","CELESTICA",2.30,5000,50],
    ["Q4'26","MEM-00422","GIGADEVICE","GD25Q132C","FLEX",2.20,2500,0],
    ["Q4'26","MEM-00437","GIGADEVICE","GD25Q133C","JABIL",2.46,5000,80]
  ]
};

const PPV_DEFAULT = {
  fileName: "PPV_File.xlsx",
  rows: [
    ["Q4'26","MEM-00292","GIGADEVICE","GD25Q127C","FOXCONN",2.40],
    ["Q4'26","MEM-00298","GIGADEVICE","GD25Q128C","FLEX",2.54],
    ["Q4'26","MEM-00325","GIGADEVICE","GD25Q129C","JABIL",2.55],
    ["Q4'26","MEM-00344","GIGADEVICE","GD25Q130C","FOXCONN",3.30],
    ["Q4'26","MEM-00374","GIGADEVICE","GD25Q131C","CELESTICA",3.50],
    ["Q4'26","MEM-00422","GIGADEVICE","GD25Q132C","FLEX",4.20],
    ["Q4'26","MEM-00437","GIGADEVICE","GD25Q133C","JABIL",3.66]
  ]
};

let mpat = { fileName: MPAT_DEFAULT.fileName, rows: MPAT_DEFAULT.rows };
let ppv = { fileName: PPV_DEFAULT.fileName, rows: PPV_DEFAULT.rows };
let sortKey = 'quarter', sortDir = 1;
let editingKey = null;

function rowKeyOf(r){
  return 'm' + (r.mpatIndex === null ? 'x' : r.mpatIndex) + '_p' + (r.ppvIndex === null ? 'x' : r.ppvIndex);
}

function keyOf(part, mfr, mpn, cm){
  return String(part).trim().toUpperCase() + '||' + String(mfr).trim().toUpperCase()
    + '||' + String(mpn).trim().toUpperCase() + '||' + String(cm).trim().toUpperCase();
}

function buildPpvIndex(rows){
  const map = {};
  rows.forEach((r, idx)=>{
    map[keyOf(r[1], r[2], r[3], r[4])] = { quarter:r[0], part:r[1], mfr:r[2], mpn:r[3], cm:r[4], price:Number(r[5]), index:idx };
  });
  return map;
}

const COLS = [
  { key:'quarter', label:'Quarter', type:'badge' },
  { key:'part', label:'Part Number', type:'mono' },
  { key:'mfr', label:'Manufacturer Name', type:'text' },
  { key:'mpn', label:'Manufacturer Part Number', type:'mono' },
  { key:'cm', label:'CM', type:'text' },
  { key:'price', label:'Item Price', type:'price' },
  { key:'ppvPrice', label:'PPV Item Price', type:'price', computed:true },
  { key:'diff', label:'MPAT − PPV Price ($)', type:'diff', computed:true },
  { key:'moq', label:'MOQ', type:'int' },
  { key:'impact', label:'PPV Impact ($)', type:'impact', computed:true },
  { key:'split', label:'Business Split', type:'split' },
  { key:'actions', label:'', type:'actions' }
];

function buildRecords(){
  const ppvIndex = buildPpvIndex(ppv.rows);
  const mpatKeys = new Set();
  const records = [];

  mpat.rows.forEach((r, idx)=>{
    const quarter = r[0], part = r[1], mfr = r[2], mpn = r[3], cm = r[4],
      price = Number(r[5]), moq = Number(r[6]), split = Number(r[7]);
    const key = keyOf(part, mfr, mpn, cm);
    mpatKeys.add(key);
    const ppvMatch = ppvIndex.hasOwnProperty(key) ? ppvIndex[key] : null;
    const ppvPrice = ppvMatch ? ppvMatch.price : null;
    const diff = ppvPrice === null ? null : (price - ppvPrice);
    const impact = ppvPrice === null ? null : diff * moq;
    records.push({ quarter, part, mfr, mpn, cm, price, moq, split, ppvPrice, diff, impact, isNew:false,
      mpatIndex: idx, ppvIndex: ppvMatch ? ppvMatch.index : null });
  });

  ppv.rows.forEach((r, idx)=>{
    const quarter = r[0], part = r[1], mfr = r[2], mpn = r[3], cm = r[4], ppvPrice = Number(r[5]);
    const key = keyOf(part, mfr, mpn, cm);
    if(mpatKeys.has(key)) return;
    records.push({ quarter, part, mfr, mpn, cm, price:null, moq:null, split:null, ppvPrice, diff:null, impact:null, isNew:true,
      mpatIndex: null, ppvIndex: idx });
  });

  return records;
}

function populateFilters(records){
  const qSel = document.getElementById('quarterFilter');
  const mSel = document.getElementById('mfrFilter');
  const curQ = qSel.value, curM = mSel.value;
  qSel.innerHTML = '<option value="">All</option>';
  mSel.innerHTML = '<option value="">All</option>';
  [...new Set(records.map(r=>r.quarter))].sort().forEach(q=>{
    const o=document.createElement('option'); o.value=q; o.textContent=q; qSel.appendChild(o);
  });
  [...new Set(records.map(r=>r.mfr))].sort().forEach(m=>{
    const o=document.createElement('option'); o.value=m; o.textContent=m; mSel.appendChild(o);
  });
  qSel.value = curQ; mSel.value = curM;
}

function renderHead(){
  const headRow = document.getElementById('headRow');
  headRow.innerHTML = '';
  COLS.forEach(col=>{
    const th = document.createElement('th');
    if(col.key === 'actions'){
      th.textContent = '';
      th.style.cursor = 'default';
      th.classList.add('actions-col');
      headRow.appendChild(th);
      return;
    }
    if(col.type==='price'||col.type==='int'||col.type==='impact'||col.type==='split'||col.type==='diff') th.classList.add('num-col');
    if(col.computed) th.classList.add('computed');
    th.textContent = col.label;
    if(sortKey === col.key){
      const arrow = document.createElement('span');
      arrow.className='arrow';
      arrow.textContent = sortDir === 1 ? '▲' : '▼';
      th.appendChild(arrow);
    }
    th.addEventListener('click', ()=>{
      if(sortKey === col.key){ sortDir *= -1; } else { sortKey = col.key; sortDir = 1; }
      renderAll();
    });
    headRow.appendChild(th);
  });
}

function fmtPrice(v){ return v === null || v === undefined ? '—' : '$' + v.toFixed(2); }
function fmtInt(v){ return v === null || v === undefined ? '—' : v.toLocaleString(); }
function fmtImpact(v){
  if(v === null) return null;
  const sign = v > 0 ? '+' : (v < 0 ? '\u2212' : '');
  return sign + '$' + Math.abs(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
}

function renderBody(records){
  const body = document.getElementById('bodyRows');
  const emptyState = document.getElementById('emptyState');
  body.innerHTML = '';

  if(records.length === 0){
    emptyState.style.display = 'block';
    document.getElementById('dataTable').style.display = 'none';
    return;
  }
  emptyState.style.display = 'none';
  document.getElementById('dataTable').style.display = 'table';

  const maxSplit = Math.max(1, ...records.map(r=>r.split||0));

  records.forEach(r=>{
    const tr = document.createElement('tr');
    if(r.isNew) tr.classList.add('row-new');
    const rk = rowKeyOf(r);
    const editing = (editingKey === rk);
    if(editing) tr.classList.add('row-editing');
    COLS.forEach(col=>{
      const td = document.createElement('td');
      if(col.computed) td.classList.add('computed');
      if(col.key === 'quarter'){
        if(editing){
          const inp = document.createElement('input');
          inp.type = 'text'; inp.className = 'edit-input edit-quarter'; inp.value = r.quarter;
          td.appendChild(inp);
        } else {
          const badge = document.createElement('span');
          badge.className = 'qbadge';
          badge.textContent = r.quarter;
          td.appendChild(badge);
        }
      } else if(col.key === 'part'){
        td.className = 'partno';
        td.textContent = r.part;
        if(r.isNew){
          const tag = document.createElement('span');
          tag.className = 'newtag';
          tag.textContent = 'NEW · PPV ONLY';
          tag.title = 'No matching Part Number + Manufacturer + Manufacturer Part Number + CM found in the MPAT file';
          td.appendChild(tag);
        }
      } else if(col.key === 'mfr'){
        if(editing){
          const inp = document.createElement('input');
          inp.type = 'text'; inp.className = 'edit-input edit-mfr'; inp.value = r.mfr;
          td.appendChild(inp);
        } else {
          td.textContent = r.mfr;
        }
      } else if(col.key === 'mpn'){
        td.className = 'mono';
        td.textContent = r.mpn || '—';
      } else if(col.key === 'cm'){
        td.textContent = r.cm || '—';
      } else if(col.key === 'price'){
        td.className = 'price num';
        if(editing && r.mpatIndex !== null){
          const inp = document.createElement('input');
          inp.type = 'number'; inp.step = '0.01'; inp.min = '0';
          inp.className = 'edit-input edit-price'; inp.value = r.price;
          td.appendChild(inp);
        } else {
          td.textContent = fmtPrice(r.price);
        }
      } else if(col.key === 'ppvPrice'){
        td.className = 'price num';
        if(editing && r.ppvIndex !== null){
          const inp = document.createElement('input');
          inp.type = 'number'; inp.step = '0.01'; inp.min = '0';
          inp.className = 'edit-input edit-ppvprice'; inp.value = r.ppvPrice;
          td.appendChild(inp);
        } else {
          td.textContent = fmtPrice(r.ppvPrice);
        }
      } else if(col.key === 'diff'){
        td.className = 'num';
        if(r.diff === null){
          const span = document.createElement('span');
          span.className = 'impact-na';
          span.textContent = r.isNew ? 'No MPAT match' : 'No PPV match';
          td.appendChild(span);
        } else {
          const span = document.createElement('span');
          span.className = r.diff > 0 ? 'impact-green' : (r.diff < 0 ? 'impact-red' : '');
          span.textContent = fmtImpact(r.diff);
          td.appendChild(span);
        }
      } else if(col.key === 'moq'){
        td.className = 'num';
        td.textContent = fmtInt(r.moq);
      } else if(col.key === 'impact'){
        td.className = 'num';
        if(r.impact === null){
          const span = document.createElement('span');
          span.className = 'impact-na';
          span.textContent = r.isNew ? 'No MPAT match' : 'No PPV match';
          td.appendChild(span);
        } else {
          const span = document.createElement('span');
          span.className = r.impact > 0 ? 'impact-green' : (r.impact < 0 ? 'impact-red' : '');
          span.textContent = fmtImpact(r.impact);
          span.title = 'MPAT price $' + r.price.toFixed(2) + ' vs PPV price $' + r.ppvPrice.toFixed(2);
          td.appendChild(span);
        }
      } else if(col.key === 'split'){
        const n = r.split;
        if(n === null){
          const span = document.createElement('span');
          span.className = 'impact-na';
          span.textContent = '—';
          td.appendChild(span);
        } else {
          const wrap = document.createElement('div');
          wrap.className = 'splitcell';
          const bar = document.createElement('div');
          bar.className = 'splitbar' + (n === 0 ? ' zero' : '');
          const fill = document.createElement('i');
          fill.style.width = Math.max(2, (n / maxSplit) * 100) + '%';
          bar.appendChild(fill);
          const num = document.createElement('span');
          num.className = 'splitval';
          num.textContent = n + '%';
          wrap.appendChild(bar);
          wrap.appendChild(num);
          td.appendChild(wrap);
        }
      } else if(col.key === 'actions'){
        td.className = 'actions-col';
        if(editing){
          const saveBtn = document.createElement('button');
          saveBtn.className = 'act-btn act-save'; saveBtn.type = 'button'; saveBtn.textContent = 'Save';
          saveBtn.addEventListener('click', ()=> saveEdit(r, tr));
          const cancelBtn = document.createElement('button');
          cancelBtn.className = 'act-btn act-cancel'; cancelBtn.type = 'button'; cancelBtn.textContent = 'Cancel';
          cancelBtn.addEventListener('click', ()=>{ editingKey = null; renderAll(); });
          td.appendChild(saveBtn);
          td.appendChild(cancelBtn);
        } else {
          const editBtn = document.createElement('button');
          editBtn.className = 'act-btn act-edit'; editBtn.type = 'button'; editBtn.textContent = 'Edit';
          editBtn.addEventListener('click', ()=>{ editingKey = rk; renderAll(); });
          const delBtn = document.createElement('button');
          delBtn.className = 'act-btn act-delete'; delBtn.type = 'button'; delBtn.textContent = 'Delete';
          delBtn.addEventListener('click', ()=> deleteRecord(r));
          td.appendChild(editBtn);
          td.appendChild(delBtn);
        }
      }
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });
}

function saveEdit(r, trEl){
  const quarterInp = trEl.querySelector('.edit-quarter');
  const mfrInp = trEl.querySelector('.edit-mfr');
  const priceInp = trEl.querySelector('.edit-price');
  const ppvPriceInp = trEl.querySelector('.edit-ppvprice');

  const newQuarter = quarterInp.value.trim();
  const newMfr = mfrInp.value.trim();
  if(!newQuarter || !newMfr){
    alert('Quarter and Manufacturer Name cannot be empty.');
    return;
  }

  let newPrice = null, newPpvPrice = null;
  if(priceInp){
    newPrice = parseFloat(priceInp.value);
    if(isNaN(newPrice) || newPrice < 0){ alert('Enter a valid Item Price.'); return; }
  }
  if(ppvPriceInp){
    newPpvPrice = parseFloat(ppvPriceInp.value);
    if(isNaN(newPpvPrice) || newPpvPrice < 0){ alert('Enter a valid PPV Item Price.'); return; }
  }

  if(r.mpatIndex !== null){
    mpat.rows[r.mpatIndex][0] = newQuarter;
    mpat.rows[r.mpatIndex][2] = newMfr;
    if(priceInp) mpat.rows[r.mpatIndex][5] = newPrice;
  }
  if(r.ppvIndex !== null){
    ppv.rows[r.ppvIndex][0] = newQuarter;
    ppv.rows[r.ppvIndex][2] = newMfr;
    if(ppvPriceInp) ppv.rows[r.ppvIndex][5] = newPpvPrice;
  }

  editingKey = null;
  renderAll();
}

function deleteRecord(r){
  const label = r.part + ' (' + r.mfr + ')';
  if(!confirm('Delete this line — ' + label + '? This removes it from the underlying MPAT and/or PPV data and cannot be undone.')) return;
  if(r.mpatIndex !== null) mpat.rows.splice(r.mpatIndex, 1);
  if(r.ppvIndex !== null) ppv.rows.splice(r.ppvIndex, 1);
  editingKey = null;
  renderAll();
}

function renderStatus(records){
  const bar = document.getElementById('statusBar');
  bar.innerHTML = '';
  const items = [];
  items.push('Displaying <b>' + records.length + '</b> of <b>' + buildRecords().length + '</b> items');
  items.push('<b>' + new Set(records.map(r=>r.mfr)).size + '</b> manufacturers');
  const newCount = records.filter(r=>r.isNew).length;
  if(newCount) items.push('<b>' + newCount + '</b> new (PPV only)');
  if(records.length){
    const withPrice = records.filter(r=>r.price !== null);
    if(withPrice.length){
      const avg = withPrice.reduce((s,r)=>s+r.price,0)/withPrice.length;
      items.push('Avg MPAT price <b>$' + avg.toFixed(2) + '</b>');
      const totalMoq = withPrice.reduce((s,r)=>s+r.moq,0);
      items.push('Total MOQ <b>' + totalMoq.toLocaleString() + '</b>');
    }
    const matched = records.filter(r=>r.impact !== null);
    if(matched.length){
      const totalImpact = matched.reduce((s,r)=>s+r.impact,0);
      const cls = totalImpact > 0 ? 'impact-green' : (totalImpact < 0 ? 'impact-red' : '');
      items.push('Total PPV impact <b class="'+cls+'">' + fmtImpact(totalImpact) + '</b>');
    }
  }
  items.forEach(html=>{
    const span = document.createElement('span');
    span.innerHTML = html;
    bar.appendChild(span);
  });
}

function renderAll(){
  document.getElementById('metaMpat').textContent = mpat.fileName;
  document.getElementById('metaPpv').textContent = ppv.fileName;
  document.getElementById('mpatLabel').textContent = mpat.fileName;
  document.getElementById('ppvLabel').textContent = ppv.fileName;

  const all = buildRecords();
  populateFilters(all);

  const search = document.getElementById('search').value.trim().toLowerCase();
  const qFilter = document.getElementById('quarterFilter').value;
  const mFilter = document.getElementById('mfrFilter').value;

  let records = all.filter(r=>{
    if(qFilter && r.quarter !== qFilter) return false;
    if(mFilter && r.mfr !== mFilter) return false;
    if(search){
      const hay = (r.quarter+' '+r.part+' '+r.mfr+' '+r.mpn+' '+r.cm).toLowerCase();
      if(!hay.includes(search)) return false;
    }
    return true;
  });

  records = records.slice().sort((a,b)=>{
    let va = a[sortKey], vb = b[sortKey];
    if(va === null) va = -Infinity;
    if(vb === null) vb = -Infinity;
    if(typeof va === 'number'){ return (va-vb)*sortDir; }
    return String(va).localeCompare(String(vb)) * sortDir;
  });

  document.getElementById('countBadge').textContent = '(' + records.length + ')';
  renderHead();
  renderBody(records);
  renderStatus(records);
}

function readSheetRows(file, cb){
  const reader = new FileReader();
  reader.onload = (evt)=>{
    const data = new Uint8Array(evt.target.result);
    const wb = XLSX.read(data, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
    const rows = json.slice(1).filter(r=>r.some(v=>v!==""));
    cb(rows);
  };
  reader.readAsArrayBuffer(file);
}

document.getElementById('loadMpatBtn').addEventListener('click', ()=> document.getElementById('mpatInput').click());
document.getElementById('mpatInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  readSheetRows(file, rows=>{
    mpat = { fileName: file.name, rows };
    renderAll();
  });
});

document.getElementById('loadPpvBtn').addEventListener('click', ()=> document.getElementById('ppvInput').click());
document.getElementById('ppvInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  readSheetRows(file, rows=>{
    ppv = { fileName: file.name, rows };
    renderAll();
  });
});

document.getElementById('search').addEventListener('input', renderAll);
document.getElementById('quarterFilter').addEventListener('change', renderAll);
document.getElementById('mfrFilter').addEventListener('change', renderAll);
document.getElementById('goBtn').addEventListener('click', renderAll);
document.getElementById('clearBtn').addEventListener('click', ()=>{
  document.getElementById('search').value = '';
  document.getElementById('quarterFilter').value = '';
  document.getElementById('mfrFilter').value = '';
  renderAll();
});

function downloadTemplate(headers, exampleRow, fileName){
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, exampleRow]);
  ws['!cols'] = headers.map(()=>({wch:18}));
  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  XLSX.writeFile(wb, fileName);
}

document.getElementById('downloadMpatTemplate').addEventListener('click', (e)=>{
  e.preventDefault();
  downloadTemplate(
    ["Quarter","Part Number","Manufacturer Name","Manufacturer Part Number","CM","Item Price","MOQ","Business Split"],
    ["Q1'27","MEM-00001","EXAMPLE-MFR","EX-MPN-001","EXAMPLE-CM",1.00,1000,50],
    'MPAT_Template.xlsx'
  );
});

document.getElementById('downloadPpvTemplate').addEventListener('click', (e)=>{
  e.preventDefault();
  downloadTemplate(
    ["Quarter","Part Number","Manufacturer Name","Manufacturer Part Number","CM","Item Price"],
    ["Q1'27","MEM-00001","EXAMPLE-MFR","EX-MPN-001","EXAMPLE-CM",1.20],
    'PPV_Template.xlsx'
  );
});

renderAll();
</script>
